<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Màn hình Ghép nối</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3713ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-between z-10">
<button aria-label="Quay lại" class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Đang tìm kiếm...</h2>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col justify-center p-4 @container relative z-10">
<!-- Radar/Avatar Area -->
<div class="flex w-full flex-col gap-8 items-center justify-center py-12">
<div class="relative flex items-center justify-center">
<!-- Pulse effect layers -->
<div class="absolute w-48 h-48 rounded-full bg-primary/20 scale-150 blur-xl"></div>
<div class="absolute w-32 h-32 rounded-full border-2 border-primary/30 scale-150"></div>
<div class="absolute w-32 h-32 rounded-full border border-primary/20 scale-125"></div>
<div class="absolute w-32 h-32 rounded-full border-4 border-primary/10 scale-[1.75]"></div>
<!-- Center Avatar/Icon -->
<div class="relative z-10 bg-primary/20 border-2 border-primary flex items-center justify-center rounded-full min-h-[8rem] w-32 shadow-[0_0_30px_rgba(55,19,236,0.3)]">
<span class="material-symbols-outlined text-[48px] text-primary">radar</span>
</div>
</div>
<div class="flex flex-col items-center justify-center gap-2 mt-8">
<p class="text-[24px] font-bold leading-tight tracking-[-0.015em] text-center">Đang quét xung quanh</p>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal text-center">Vui lòng đợi một chút...</p>
</div>
</div>
<!-- Interests Section -->
<div class="mt-auto pb-8 w-full">
<h3 class="text-lg font-bold leading-tight tracking-[-0.015em] px-2 pb-3">Sở thích hiện tại</h3>
<div class="flex gap-3 flex-wrap justify-center sm:justify-start px-2">
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary/20 px-5 border border-primary/20">
<span class="material-symbols-outlined text-[18px] text-primary">movie</span>
<p class="text-sm font-medium leading-normal text-primary">Phim Ảnh</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary/20 px-5 border border-primary/20">
<span class="material-symbols-outlined text-[18px] text-primary">music_note</span>
<p class="text-sm font-medium leading-normal text-primary">Âm Nhạc</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary/20 px-5 border border-primary/20">
<span class="material-symbols-outlined text-[18px] text-primary">sports_esports</span>
<p class="text-sm font-medium leading-normal text-primary">Game</p>
</div>
</div>
</div>
</div>
<!-- Bottom Action -->
<div class="flex px-6 py-6 pb-10 z-10">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 text-base font-bold leading-normal tracking-[0.015em] transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="truncate">Hủy tìm kiếm</span>
</button>
</div>
</div>
</body></html>
